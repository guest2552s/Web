<!-- บรรทัดที่ 1: บอก Browser ว่านี่คือไฟล์ HTML5 เวอร์ชันล่าสุด -->
<!DOCTYPE html>
<html>
<head>
    <!-- บรรทัดที่ 5: ตั้งค่าให้รองรับภาษาไทยและอักขระพิเศษได้ถูกต้อง -->
    <meta charset="UTF-8">
    
    <!-- บรรทัดที่ 8: ข้อความที่จะไปแสดงบนแท็บ (Tab) ของ Browser -->
    <title>Code Quest</title>
    
    <!-- บรรทัด温 11: ดึงระบบกล่องเขียนโค้ด (Monaco Editor) มาจากอินเทอร์เน็ต โดยไม่ต้องติดตั้งลงเครื่อง -->
    <script src="https://cdn.jsdelivr.net/npm/monaco-editor@0.44.0/min/vs/loader.js"></script>

    <!-- บรรทัดที่ 14-29: ส่วนของ CSS เอาไว้ตกแต่งหน้าตาหน้าเว็บ -->
    <style>
        body {
            background: rgb(170, 196, 255);
            font-family: 'Segoe UI', sans-serif; /* เปลี่ยนฟอนต์ให้ดูทันสมัยขึ้น */
            padding: 20px; /* เว้นระยะห่างจากขอบจอเข้ามา 20 พิกเซล */
        }
        #editor {
            width: 100%;       /* ให้กล่องเขียนโค้ดกว้างเต็มหน้าจอ */
            height: 300px;     /* ให้กล่องเขียนโค้ดสูง 300 พิกเซล */
            border: 1px solid #7e38ee; /* ใส่เส้นขอบสีเทาจางๆ รอบกล่อง */
            margin-bottom: 10px; /* เว้นช่องว่างด้านล่างกล่อง ก่อนถึงปุ่ม Submit */
        }
        button {
            padding: 8px 16px; /* ขยายขนาดปุ่ม Submit ให้ใหญ่ขึ้น กดง่ายขึ้น */
            cursor: pointer;   /* เปลี่ยนรูปเมาส์เป็นนิ้วชี้ตอนที่ชี้ไปที่ปุ่ม */
            color: rgb(62, 107, 213);
        }
    </style>
</head>
<body>

    <!-- บรรทัดที่ 34: หัวข้อหลักของเพจ (ชื่อด่าน) -->
    <h1>Episode 1: The Gate</h1>
    
    <!-- บรรทัดที่ 37: คำอธิบายหรือคำสั่งโจทย์ให้นักเรียนอ่าน -->
    <p>เขียน C++ เพื่อผ่านด่าน</p>

    <!-- บรรทัดที่ 40: กล่องเปล่าๆ ที่เตรียมไว้ให้ Monaco Editor เอาตัวระบบเขียนโค้ดมาฝังลงไป -->
    <div id="editor"></div>

    <!-- บรรทัดที่ 43: ปุ่มกดส่งโค้ด เมื่อคลิกจะไปสั่งให้ฟังก์ชัน submitCode() ทำงาน -->
    <button onclick="submitCode()">Submit</button>
    
    <!-- บรรทัดที่ 46: กล่องข้อความว่างๆ เอาไว้แสดงผลลัพธ์หลังจากที่กดส่งโค้ดแล้ว -->
    <p id="output"></p>

    <!-- บรรทัดที่ 49-79: ส่วนของ JavaScript ควบคุมระบบการทำงานทั้งหมด -->
    <script>
        
        /* [ส่วนที่ 1: ตั้งค่าพาธ] */
        /* บอกตัวโหลด (Require) ว่าไฟล์โค้ดของ Monaco Editor ทั้งหมดถูกเก็บไว้ที่ลิงก์ CDN นี้ */
        require.config({ 
            paths: { vs: 'https://cdn.jsdelivr.net/npm/monaco-editor@0.44.0/min/vs' } 
        });

        /* บรรทัดที่ 59: ประกาศตัวแปรเปล่าชื่อ editor ไว้ เพื่อให้ฟังก์ชันอื่นๆ ในหน้านี้สามารถเรียกใช้ร่วมกันได้ */
        let editor;
        
        /* บรรทัดที่ 62: กำหนดโค้ด C++ เริ่มต้นที่จะให้มันโผล่ขึ้นมาในกล่องตอนเปิดหน้าเว็บครั้งแรก */
        const defaultCode = '#include <iostream>\nusing namespace std;\n\nint main() {\n    // เขียนโค้ดของคุณตรงนี้\n    \n    return 0;\n}';

        /* [ส่วนที่ 2: สั่งให้กล่องเขียนโค้ดทำงาน] */
        /* เรียกใช้โมดูลของ Monaco Editor แล้วสร้าง (Create) กล่องเขียนโค้ดลงในดิฟ #editor */
        require(['vs/editor/editor.main'], function() {
            editor = monaco.editor.create(document.getElementById('editor'), {
                value: defaultCode, // ดึงโค้ด C++ เริ่มต้นที่ตั้งไว้ด้านบนมาแสดง
                language: 'cpp',    // เปิดระบบไฮไลต์สีสันตามไวยากรณ์ของภาษา C++
                theme: 'vs-dark'    // เปลี่ยนธีมกล่องให้เป็นสีมืด (เหมือนในโปรแกรม VS Code)
            });
        });

        /* [ส่วนที่ 3: ทำงานเมื่อกดปุ่ม Submit] */
        function submitCode() {
            /* บรรทัดที่ 75: ดึงข้อความ/โค้ดทั้งหมดที่เด็กพิมพ์อยู่ในกล่อง ณ ตอนนั้น ออกมาเก็บไว้ในตัวแปร code */
            const code = editor.getValue();
            
            /* บรรทัดที่ 78: เอาโค้ดที่ดึงมาได้ ไปยัดใส่ในแท็ก <p id="output"> เพื่อแสดงผลให้นักเรียนเห็นบนหน้าจอ */
            document.getElementById('output').innerText = "โค้ดของคุณ:\n" + code;
        }
    </script>

</body>
</html>
