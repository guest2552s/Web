<!DOCTYPE html>
<html>
    <head>
        <script src="https://cdn.jsdelivr.net/npm/monaco-editor@0.44.0/min/vs/loader.js"></script>
        <title>grader</title>
        <style>

            .back-btn{
            background:#35046d;
            color:white;
            border:none;
            padding:10px 18px;
            border-radius:8px;
            cursor:pointer;
            margin-bottom:15px;
            font-size:16px;
            }

            .back-btn:hover{
            background:#4b078f;
            }
            
            #edit{
                width: 50%;
                height: 300px;
                border: 1px solid #35046d;
                display: flex;  
                justify-content: flex-end;
                align-items: flex-end; 
            }
        </style>
    </head>
    <body>
        <button class="back-btn" onclick="window.location.href='../index.html'">
        ← Back
        </button>

        <h1>EP1</h1>
        <h1>EP1</h1>
        <p>cout 2 ตัวเลขมา</p>
        <div id="edit"></div>
        <button onclick="submitCode()">ส่ง</button>
        <h3>ผล:</h3>
        <div id="out"></div>

        <script>
            require.config({ paths: { vs: 'https://cdn.jsdelivr.net/npm/monaco-editor@0.44.0/min/vs' } });
            let editor;

            require(['vs/editor/editor.main'], function(){
                editor = monaco.editor.create(document.getElementById('edit'), {
                    value: '#include<bits/stdc++.h>\nusing namespace std;\nint main(){\n\n}',
                    language: 'cpp',
                    theme: 'vs-dark',
                });
            });

            async function submitCode() {
                const code = editor.getValue();
                const encoded = btoa(unescape(encodeURIComponent(code)));
                document.getElementById('out').innerHTML = 'กำลังรัน...';
                const res = await fetch(
                    'https://ce.judge0.com/submissions?base64_encoded=true&wait=true',{
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            source_code: encoded,
                            language_id: 54,
                            stdin: '',
                        })
                    }
                )
                const data = await res.json();
                const output = data.stdout ? atob(data.stdout).trim() : '';
                const error = data.stderr ? atob(data.stderr).trim() : '';
                if (data.status.id === 3) {
                   document.getElementById('out').innerHTML = 'Output: ' + output;
                }
                else{
                    document.getElementById('out').innerHTML = 'Error: ' + error;
                }
            }
        </script>
    </body>
</html>
