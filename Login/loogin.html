<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Login</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{

    height:100vh;

    display:flex;
    justify-content:center;
    align-items:center;

    background:
    linear-gradient(135deg,#181A20,#232834,#15161B);

    overflow:hidden;
}

/* Floating background circles */

body::before,
body::after{

    content:"";

    position:absolute;

    width:350px;
    height:350px;

    border-radius:50%;

    background:rgba(77,157,255,0.08);

    filter:blur(80px);

}

body::before{

    top:-120px;
    left:-120px;

}

body::after{

    bottom:-120px;
    right:-120px;

}

/* Login Card */

.container{

    width:420px;

    background:#242932;

    border:1px solid #323845;

    border-radius:20px;

    padding:45px;

    box-shadow:
    0 0 40px rgba(0,0,0,.45);

    z-index:10;

}

/* Title */

h1{

    color:white;

    text-align:center;

    margin-bottom:8px;

}

.subtitle{

    color:#9fa6b2;

    text-align:center;

    margin-bottom:35px;

    font-size:15px;

}

/* Labels */

label{

    display:block;

    color:white;

    margin-bottom:8px;

    margin-top:18px;

}

/* Inputs */

.inputBox{

    position:relative;

}

input{

    width:100%;

    height:50px;

    background:#1c2027;

    color:white;

    border:1px solid #3d4554;

    border-radius:10px;

    padding-left:15px;
    padding-right:50px;

    outline:none;

    font-size:16px;

    transition:.25s;

}

input:focus{

    border-color:#4d9dff;

    box-shadow:0 0 12px rgba(77,157,255,.35);

}

/* Eye */

.eye{

    position:absolute;

    right:15px;
    top:50%;

    transform:translateY(-50%);

    cursor:pointer;

    user-select:none;

    color:#999;

}

/* Login Button */

.login{

    width:100%;

    height:50px;

    margin-top:30px;

    border:none;

    border-radius:10px;

    cursor:pointer;

    background:#4d9dff;

    color:white;

    font-size:17px;

    font-weight:bold;

    transition:.25s;

}

.login:hover{

    background:#2d8cff;

    transform:translateY(-2px);

}

/* Create */

.create{

    margin-top:18px;

    text-align:center;

    color:#a8b0bb;

}

.create a{

    color:#4d9dff;

    text-decoration:none;

    font-weight:bold;

}

.create a:hover{

    text-decoration:underline;

}

/* Back */

.back{

    position:absolute;

    top:25px;
    left:25px;

    width:50px;
    height:50px;

    border:none;

    border-radius:50%;

    background:#242932;

    color:white;

    font-size:22px;

    cursor:pointer;

    transition:.25s;

}

.back:hover{

    background:#4d9dff;

}

</style>

</head>

<body>

<button class="back" onclick="window.location.href='../index.html'">
←
</button>

<div class="container">

<h1>Welcome Back</h1>

<p class="subtitle">
Sign in to continue your coding journey
</p>

<form>

<label>Username</label>

<div class="inputBox">
<input
type="text"
placeholder="Enter your username"
required>
</div>

<label>Password</label>

<div class="inputBox">

<input
id="password"
type="password"
placeholder="Enter your password"
required>

<span
class="eye"
onclick="togglePassword()">
👁
</span>

</div>

<button
class="login"
type="submit">
Login
</button>

<div class="create">

Don't have an account?

<br><br>

<a href="../Signup/index.html">
Create Account
</a>

</div>

</form>

</div>

<script>

function togglePassword(){

const password=document.getElementById("password");

if(password.type==="password"){

password.type="text";

}else{

password.type="password";

}

}

</script>

</body>
</html>
