<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Pixel Art Game</title>
    <style>
        body { margin: 0; background-color: #222; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        canvas { border: 4px solid #fff; image-rendering: pixelated; background-color: #444; }
    </style>
</head>
<body>

    <canvas id="gameCanvas" width="400" height="400"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // 1. โหลดไฟล์ Sprite Sheet
        const playerSheet = new Image();
        playerSheet.src = 'pixilart-sprite.png'; // ชื่อไฟล์ต้องตรงกับที่คุณเซฟมา

        // ตั้งค่าขนาดพิกเซลของตัวละคร (สมมุติตอนวาดวาดมาเฟรมละ 32x32 พิกเซล)
        // **ถ้าตอนวาดขนาดไม่ใช่ 32 ให้แก้ตัวเลขตรงนี้ครับ เช่น 16 หรือ 64**
        const frameWidth = 64; 
        const frameHeight = 64;

        // ข้อมูลของตัวละครและการเคลื่อนไหว
        let playerX = 100;
        let playerY = 100;
        
        let currentFrame = 0;   // เฟรมปัจจุบัน (0, 1, 2)
        const totalFrames = 3;  // ทั้งหมดมี 3 เฟรมตามที่คุณทำมา
        let frameTimer = 0;     // ตัวนับเวลาสลับเฟรม
        const frameSpeed = 15;  // ความเร็วในการเปลี่ยนเฟรม (ยิ่งน้อยยิ่งขยับไว)

        function gameLoop() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // 2. คำนวณเพื่อสลับเฟรมภาพเคลื่อนไหว
            frameTimer++;
            if (frameTimer >= frameSpeed) {
                currentFrame = (currentFrame + 1) % totalFrames; // วนลูป 0 -> 1 -> 2 -> 0
                frameTimer = 0;
            }

            // 3. วาดภาพโดยตัดเอาเฉพาะเฟรมที่ต้องการมาจาก Sprite Sheet
            if (playerSheet.complete) {
                ctx.drawImage(
                    playerSheet,
                    currentFrame * frameWidth, 0, // ตำแหน่ง X และ Y ที่เริ่มตัดใน Sprite Sheet
                    frameWidth, frameHeight,       // ความกว้างและสูงของเฟรมที่จะตัดออกมา
                    playerX, playerY,              // ตำแหน่ง X และ Y ที่จะวาดบนหน้าจอเกม
                    64, 64                         // ขนาดที่จะให้แสดงผลในเกม (ขยายจาก 32 เป็น 64 ให้ตัวใหญ่ขึ้น)
                );
            }

            requestAnimationFrame(gameLoop);
        }

        playerSheet.onload = function() {
            gameLoop();
        };
    </script>
</body>
</html>
