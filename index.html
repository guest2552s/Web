<!DOCTYPE html>
<!-- บอกเบราว์เซอร์ว่านี่คือเอกสาร HTML5 -->
<html lang="th">
<!-- เริ่มต้นเอกสาร HTML กำหนดภาษาเป็นไทย -->
<head>
    <meta charset="UTF-8">
    <!-- กำหนดการเข้ารหัสตัวอักษรเป็น UTF-8 เพื่อให้แสดงภาษาไทย/อังกฤษได้ถูกต้อง -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- ปรับการแสดงผลให้เหมาะกับขนาดหน้าจอมือถือ/แท็บเล็ต -->
    <title>My Pixel Art Game</title>
    <!-- ข้อความที่จะแสดงบนแท็บของเบราว์เซอร์ -->
    <style>
        /* ส่วนนี้คือ CSS ใช้จัดหน้าตา/สไตล์ของหน้าเว็บ */
        body {
            margin: 0;                     /* ลบขอบว่างรอบหน้าเว็บ */
            background-color: #222;        /* สีพื้นหลังหน้าเว็บเป็นเทาเข้ม */
            display: flex;                 /* ใช้ flexbox จัดตำแหน่ง */
            justify-content: center;       /* จัดกึ่งกลางแนวนอน */
            align-items: center;           /* จัดกึ่งกลางแนวตั้ง */
            height: 100vh;                 /* ความสูงเต็มหน้าจอ */
            overflow: hidden;              /* ซ่อนส่วนที่ล้นออกนอกจอ ไม่ให้มี scrollbar */
        }
        canvas {
            border: 4px solid #fff;        /* ขอบสีขาวรอบ canvas หนา 4px */
            image-rendering: pixelated;    /* ทำให้ภาพพิกเซลคมชัด ไม่เบลอตอนขยาย */
            background-color: #444;        /* สีพื้นหลังของ canvas เอง */
        }
    </style>
</head>
<body>

    <canvas id="gameCanvas" width="400" height="400"></canvas>
    <!-- พื้นที่วาดภาพ/เกม กำหนด id ไว้เรียกใช้ใน JavaScript ขนาด 400x400 พิกเซล -->

    <script>
        // ส่วนนี้คือ JavaScript ใช้ควบคุมการทำงานของเกม

        const canvas = document.getElementById('gameCanvas');
        // ดึง element canvas จาก HTML มาเก็บไว้ในตัวแปร canvas

        const ctx = canvas.getContext('2d');
        // ขอ "เครื่องมือวาดภาพ 2 มิติ" จาก canvas เก็บไว้ในตัวแปร ctx
        // ทุกคำสั่งวาดภาพจะเรียกผ่าน ctx

        // 1. โหลดไฟล์ Sprite Sheet
        const playerSheet = new Image();
        // สร้าง object รูปภาพเปล่าๆ ขึ้นมา

        playerSheet.src = 'pixilart-sprite.png';
        // กำหนดไฟล์รูปที่จะโหลด (ต้องอยู่โฟลเดอร์เดียวกับไฟล์ html นี้)

        // ตั้งค่าขนาดพิกเซลของตัวละคร (สมมุติตอนวาดมาเฟรมละ 32x32 พิกเซล)
        const frameWidth = 64;
        // ความกว้างของภาพ 1 เฟรม (1 ท่าทาง) ใน sprite sheet หน่วยพิกเซล
        const frameHeight = 64;
        // ความสูงของภาพ 1 เฟรม

        // ข้อมูลของตัวละครและการเคลื่อนไหว
        let playerX = center;
        // ตำแหน่งตัวละครบนแกน X (แนวนอน) บน canvas
        let playerY = center;
        // ตำแหน่งตัวละครบนแกน Y (แนวตั้ง) บน canvas

        let currentFrame = 0;
        // เฟรมปัจจุบันที่กำลังแสดง (เริ่มที่ 0)
        const totalFrames = 3;
        // จำนวนเฟรมทั้งหมดที่มีใน sprite sheet (มี 3 ท่า)
        let frameTimer = 0;
        // ตัวนับเฟรม (รอบของ requestAnimationFrame) เพื่อหน่วงเวลาสลับภาพ
        const frameSpeed = 13;
        // ต้องนับครบกี่รอบถึงจะเปลี่ยนเฟรม (ยิ่งน้อย = สลับไว, ยิ่งมาก = สลับช้า)

        function gameLoop() {
            // ฟังก์ชันหลักที่ทำงานวนซ้ำตลอดเวลา เพื่อวาดภาพใหม่ทุกเฟรม (คล้าย "หัวใจ" ของเกม)

            ctx.clearRect(0, 0, canvas.width, canvas.height);
            // ล้างภาพเก่าทั้งหมดบน canvas ก่อนวาดใหม่ (ไม่งั้นภาพจะซ้อนทับกันเลอะ)

            // 2. คำนวณเพื่อสลับเฟรมภาพเคลื่อนไหว
            frameTimer++;
            // เพิ่มตัวนับทุกครั้งที่ลูปทำงาน

            if (frameTimer >= frameSpeed) {
                // ถ้านับครบตามที่กำหนด (13 ครั้ง) ให้เปลี่ยนเฟรม
                currentFrame = (currentFrame + 1) % totalFrames;
                // เปลี่ยนไปเฟรมถัดไป พอครบ 3 แล้ววนกลับไปเฟรม 0 ใหม่ (0 -> 1 -> 2 -> 0...)
                frameTimer = 0;
                // รีเซ็ตตัวนับกลับเป็น 0 เพื่อเริ่มนับใหม่
            }

            // 3. วาดภาพโดยตัดเอาเฉพาะเฟรมที่ต้องการมาจาก Sprite Sheet
            if (playerSheet.complete) {
                // ตรวจสอบว่ารูปโหลดเสร็จสมบูรณ์แล้วหรือยัง ก่อนจะวาด (กันรูปยังไม่มาแล้วพัง)

                ctx.drawImage(
                    playerSheet,
                    // ภาพต้นฉบับ (sprite sheet ทั้งแผ่น)

                    currentFrame * frameWidth, 0,
                    // ตำแหน่งเริ่มตัดภาพในไฟล์ต้นฉบับ
                    // X = เฟรมปัจจุบัน คูณ ความกว้างเฟรม (เลื่อนไปขวาทีละเฟรม)
                    // Y = 0 (แถวบนสุด)

                    frameWidth, frameHeight,
                    // ขนาดพื้นที่ที่จะตัดออกมาจากต้นฉบับ (กว้าง x สูง ของ 1 เฟรม)

                    playerX, playerY,
                    // ตำแหน่งที่จะเอาภาพไปวางบน canvas

                    64, 64
                    // ขนาดที่จะแสดงผลจริงบนหน้าจอ (ในที่นี้เท่ากับขนาดต้นฉบับพอดี)
                );
            }

            requestAnimationFrame(gameLoop);
            // สั่งให้เบราว์เซอร์เรียก gameLoop ซ้ำอีกครั้งในเฟรมถัดไป (ทำให้เกิดการวนลูปไม่รู้จบ)
        }

        playerSheet.onload = function() {
            // ฟังก์ชันนี้จะถูกเรียกอัตโนมัติ "เมื่อรูปโหลดเสร็จแล้วเท่านั้น"
            gameLoop();
            // เริ่มต้นลูปเกมครั้งแรก
        };
    </script>
</body>
</html>
