<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Pixel Art Game</title>
    <style>
        /* ส่วนนี้คือ CSS ใช้จัดหน้าตา/สไตล์ของหน้าเว็บ */
        body {
            margin: 0;                    /* ลบขอบว่างรอบหน้าเว็บ */
            background-color: #222;        /* สีพื้นหลังหน้าเว็บเป็นเทาเข้ม */
            display: flex;                 /* ใช้ flexbox จัดตำแหน่ง */
            justify-content: flex-start;       /* จัดกึ่งกลางแนวนอน */
            align-items: flex-start;           /* จัดกึ่งกลางแนวตั้ง */
            height: 100vh;                 /* ความสูงเต็มหน้าจอ */
            overflow: hidden;              /* ซ่อนส่วนที่ล้นออกนอกจอ ไม่ให้มี scrollbar */
        }
        canvas {
            border: 4px solid #fff;        /* ขอบสีขาวรอบ canvas หนา 4px */
            image-rendering: pixelated;    /* ทำให้ภาพพิกเซลคมชัด ไม่เบลอตอนขยาย */
            background-color: #444;        /* สีพื้นหลังของ canvas เอง */
        }
    </style>
</head>
<body>

    <canvas id="gameCanvas" width="400" height="400"></canvas>
    <script>
        // ส่วนนี้คือ JavaScript ใช้ควบคุมการทำงานของเกม

        const canvas = document.getElementById('gameCanvas');
        // ดึง element canvas จาก HTML มาเก็บไว้ในตัวแปร canvas

        const ctx = canvas.getContext('2d');
        // ขอ "เครื่องมือวาดภาพ 2 มิติ" จาก canvas เก็บไว้ในตัวแปร ctx
        // ทุกคำสั่งวาดภาพจะเรียกผ่าน ctx

        // 1. โหลดไฟล์ Sprite Sheet ตัวละคร
        const playerSheet = new Image();
        playerSheet.src = 'pixilart-sprite.png';

        // ===== NEW: Animated Background Setup =====
        const bgSheet = new Image();
        bgSheet.src = 'IMG_0052.png'; // ไฟล์ภาพแอนิเมชันพื้นหลังแบบ Grid 4x3

        // กำหนดรายละเอียดโครงสร้าง Grid ของพื้นหลัง
        const bgCols = 4;             // จำนวนคอลัมน์ในรูปภาพ
        const bgRows = 3;             // จำนวนแถวในรูปภาพ
        const totalBgFrames = 12;     // จำนวนเฟรมทั้งหมด (4 x 3)

        let currentBgFrame = 0;       // เฟรมพื้นหลังปัจจุบัน (0 ถึง 11)
        let bgTimer = 0;              // ตัวนับรอบเพื่อหน่วงความเร็วแอนิเมชันพื้นหลัง
        const bgSpeed = 8;            // ความเร็วแอนิเมชันพื้นหลัง (ยิ่งน้อยยิ่งสลับภาพไว)
        // ==========================================

        // ตั้งค่าขนาดพิกเซลของตัวละคร
        const frameWidth = 64;        // ความกว้างของภาพ 1 เฟรมในสไปรต์ตัวละคร
        const frameHeight = 64;       // ความสูงของภาพ 1 เฟรม

        // ข้อมูลของตัวละครและการเคลื่อนไหว
        let playerX = 100;            // ตำแหน่งตัวละครบนแกน X
        let playerY = 100;            // ตำแหน่งตัวละครบนแกน Y

        let currentFrame = 0;         // เฟรมปัจจุบันของตัวละครที่กำลังแสดง
        const totalFrames = 3;        // จำนวนเฟรมทั้งหมดของตัวละคร
        let frameTimer = 0;           // ตัวนับเฟรมของตัวละคร
        const frameSpeed = 13;        // ความเร็วแอนิเมชันตัวละคร

        function gameLoop() {
            // ฟังก์ชันหลักที่ทำงานวนซ้ำตลอดเวลา เพื่อวาดภาพใหม่ทุกเฟรม

            ctx.clearRect(0, 0, canvas.width, canvas.height);
            // ล้างภาพเก่าทั้งหมดบน canvas ก่อนวาดใหม่

            // ===== NEW: Process & Draw Animated Background =====
            bgTimer++;
            if (bgTimer >= bgSpeed) {
                currentBgFrame = (currentBgFrame + 1) % totalBgFrames; // วนเฟรมที่ 0 ถึง 11
                bgTimer = 0;
            }

            if (bgSheet.complete) {
                // คำนวณหาขนาดที่แท้จริงของภาพเดี่ยว 1 เฟรม จากขนาดภาพรวมที่โหลดเข้ามา
                const bgFrameWidth = bgSheet.width / bgCols;
                const bgFrameHeight = bgSheet.height / bgRows;

                // คำนวณหาพิกัด X และ Y (แถวและคอลัมน์) บนสไปรต์ชีต grid 4x3
                const bgSourceX = (currentBgFrame % bgCols) * bgFrameWidth;
                const bgSourceY = Math.floor(currentBgFrame / bgCols) * bgFrameHeight;

                ctx.drawImage(
                    bgSheet,
                    bgSourceX, bgSourceY,         // ตำแหน่งเริ่มต้นตัดภาพแกน X, Y บน Grid
                    bgFrameWidth, bgFrameHeight,   // ขนาดความกว้าง, สูง ของ 1 เฟรมที่จะตัดมา
                    0, 0,                          // วาดที่มุมซ้ายบนสุดของ Canvas (0, 0)
                    canvas.width, canvas.height    // ปรับยืดภาพให้เต็มพื้นที่ความกว้างและสูงของ Canvas
                );
            }
            // ====================================================

            // 2. คำนวณเพื่อสลับเฟรมภาพเคลื่อนไหวตัวละคร
            frameTimer++;
            if (frameTimer >= frameSpeed) {
                currentFrame = (currentFrame + 1) % totalFrames;
                frameTimer = 0;
            }

            // 3. วาดภาพโดยตัดเอาเฉพาะเฟรมที่ต้องการมาจาก Sprite Sheet ตัวละคร
            if (playerSheet.complete) {
                ctx.drawImage(
                    playerSheet,
                    currentFrame * frameWidth, 0,   // ตำแหน่งเริ่มตัดภาพตัวละครในแผ่นสไปรต์ชีต
                    frameWidth, frameHeight,         // ขนาดพื้นที่ที่จะตัดออกมาจากต้นฉบับ
                    playerX, playerY,               // ตำแหน่งที่จะเอาภาพไปวางบน canvas
                    64, 64                          // ขนาดที่จะแสดงผลจริงบนหน้าจอ
                );
            }

            requestAnimationFrame(gameLoop);
            // สั่งให้เบราว์เซอร์เรียก gameLoop ซ้ำอีกครั้งในเฟรมถัดไป
        }

        // เริ่มรันระบบเมื่อตัวภาพพื้นหลังพร้อมใช้งาน
        bgSheet.onload = function() {
            gameLoop();
        };
    </script>
</body>
</html>
